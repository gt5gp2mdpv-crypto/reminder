<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StudyFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0e13;--sf:#161820;--sf2:#1c1e2c;--sf3:#232538;
  --bd:#2a2d4a;--bd2:#363a60;
  --ac:#7c85f5;--ac2:#f5a97f;--ac3:#a6e3a1;--ac4:#f38ba8;--ac5:#cba6f7;
  --tx:#cdd6f4;--td:#7f849c;--tm:#3d4066;
  --cj:#f5a97f;--cg:#89dceb;--cz:#a6e3a1;--co:#cba6f7;
  --exp:#f38ba8;--wrn:#f9e2af;
  --fd:'DM Serif Display',serif;--fm:'DM Mono',monospace;--fj:'Noto Sans JP',sans-serif;
  --r:12px;--rs:8px;--nav-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fj);overflow:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;}
header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;position:relative;z-index:30;}
.hbg{background:none;border:none;color:var(--td);cursor:pointer;padding:6px;border-radius:6px;display:flex;flex-direction:column;gap:4px;transition:color .15s;}
.hbg:hover{color:var(--tx);}
.hbg span{display:block;width:18px;height:2px;background:currentColor;border-radius:1px;transition:all .25s;}
.hbg.open span:nth-child(1){transform:translateY(6px) rotate(45deg);}
.hbg.open span:nth-child(2){opacity:0;}
.hbg.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}
h1{font-family:var(--fd);font-size:22px;color:var(--ac);}
#clock{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--tm);}

/* ── LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── DRAWER NAV ── */
.nav-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:20;opacity:0;pointer-events:none;transition:opacity .25s;}
.nav-overlay.show{opacity:1;pointer-events:all;}
.nav{position:absolute;left:0;top:0;bottom:0;width:var(--nav-w);background:var(--sf);border-right:1px solid var(--bd);z-index:21;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:14px 8px;gap:2px;overflow-y:auto;}
.nav.open{transform:translateX(0);}
.nt{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--rs);border:none;background:transparent;color:var(--td);cursor:pointer;font-family:var(--fj);font-size:13px;font-weight:500;transition:all .15s;width:100%;text-align:left;}
.nt:hover{background:var(--sf2);color:var(--tx);}
.nt.active{background:var(--sf2);color:var(--tx);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cnt{margin-left:auto;font-family:var(--fm);font-size:10px;background:var(--sf3);color:var(--tm);padding:1px 6px;border-radius:10px;}
.nsep{height:1px;background:var(--bd);margin:5px 4px;}
.nbot{margin-top:auto;border-top:1px solid var(--bd);padding-top:8px;display:flex;flex-direction:column;gap:3px;}
.syncs{font-family:var(--fm);font-size:9px;color:var(--tm);padding:2px 12px 4px;}

/* ── RIGHT ── */
.right{flex:1;overflow-y:auto;padding:18px 16px;}

/* ── PANEL HEADER ── */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ph-t{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.ph-bar{width:3px;height:16px;border-radius:2px;}
.add-p-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);background:var(--sf2);border:1px dashed var(--bd2);color:var(--td);cursor:pointer;font-family:var(--fj);font-size:12px;transition:all .15s;}
.add-p-btn:hover,.add-p-btn:active{border-color:var(--ac);color:var(--ac);}

/* ══ PARENT CARD ══ */
.plist{display:flex;flex-direction:column;gap:12px;}
.pc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:border-color .15s;}
.pc.xp-border{border-color:rgba(243,139,168,.4);}
.pc-head{display:flex;align-items:center;gap:9px;padding:12px 12px 10px;}
.pc-bar{width:3px;height:30px;border-radius:2px;flex-shrink:0;}
.pc-info{flex:1;min-width:0;}
.pc-title{font-size:14px;font-weight:600;word-break:break-all;}
.pc-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
.tag{font-size:10px;font-family:var(--fm);padding:2px 6px;border-radius:20px;background:var(--sf3);color:var(--td);}
.tag.t-問題集{background:rgba(245,169,127,.15);color:var(--cj);}
.tag.t-教科書{background:rgba(137,220,235,.15);color:var(--cg);}
.tag.t-単語帳{background:rgba(166,227,161,.15);color:var(--cz);}
.tag.t-授業復習{background:rgba(203,166,247,.15);color:var(--co);}
.tag.t-汎用{background:rgba(124,133,245,.15);color:var(--ac);}
.pc-summ{display:flex;gap:4px;flex-wrap:wrap;margin:0 12px 8px;}
.badge{font-size:10px;font-family:var(--fm);padding:2px 7px;border-radius:10px;display:inline-flex;align-items:center;gap:3px;}
.badge.ok{background:rgba(166,227,161,.1);color:var(--ac3);}
.badge.warn{background:rgba(249,226,175,.1);color:var(--wrn);}
.badge.urgent{background:rgba(243,139,168,.1);color:var(--exp);}
.badge.expired{background:rgba(243,139,168,.2);color:var(--exp);}
.badge.prog{background:rgba(124,133,245,.1);color:var(--ac);}
.pc-acts{display:flex;gap:2px;flex-shrink:0;}
.act{padding:5px 7px;border-radius:5px;background:transparent;border:none;color:var(--tm);cursor:pointer;font-size:12px;transition:all .12s;}
.act:hover,.act:active{background:var(--sf3);color:var(--tx);}
.act.del:hover,.act.del:active{color:var(--exp);}
.pc-strip{display:flex;align-items:center;gap:6px;padding:0 12px 9px;border-bottom:1px solid var(--bd);}
.tog{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--td);font-size:11px;font-family:var(--fm);cursor:pointer;padding:4px 6px;border-radius:5px;transition:all .12s;}
.tog:hover{color:var(--tx);background:var(--sf2);}
.chev{transition:transform .2s;display:inline-block;}
.tog.open .chev{transform:rotate(90deg);}
.add-s-btn{display:flex;align-items:center;gap:4px;background:none;border:1px dashed var(--bd);color:var(--td);font-size:11px;font-family:var(--fj);cursor:pointer;padding:4px 10px;border-radius:5px;transition:all .12s;margin-left:auto;}
.add-s-btn:hover,.add-s-btn:active{border-color:var(--ac);color:var(--ac);}

/* ══ SUBTASK AREA ══ */
.sub-area{padding:8px 8px 6px;}
.sub-area.hidden{display:none;}

/* ══ SUBTASK CARD ══ */
.sc{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;transition:border-color .15s;margin-bottom:6px;}
.sc:hover{border-color:var(--bd2);}
.sc.xp-c{border-color:rgba(243,139,168,.3);}
.sc.done-c{opacity:.5;}
.sc-head{display:flex;align-items:flex-start;gap:7px;padding:9px 11px;}
.chk{width:16px;height:16px;border-radius:3px;border:2px solid var(--bd2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk.on{background:var(--ac3);border-color:var(--ac3);}
.chk.on::after{content:'✓';font-size:9px;color:#1e2030;font-weight:800;}
.sc-body{flex:1;min-width:0;}
.sc-title{font-size:13px;font-weight:500;word-break:break-all;}
.sc-title.done{text-decoration:line-through;color:var(--td);}
.sc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
.sc-acts{display:flex;gap:2px;flex-shrink:0;}
.sc-field-main{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sc-field-main.done{text-decoration:line-through;color:var(--td);}
.sc-field-sep{color:var(--tm);font-weight:300;}
.sc-prog{padding:0 11px 8px;display:flex;align-items:center;gap:7px;}
.pl{font-size:10px;font-family:var(--fm);color:var(--td);white-space:nowrap;}
.pslider{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--sf3);outline:none;cursor:pointer;}
.pslider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ac);cursor:pointer;border:2px solid var(--bg);}
.ppct{font-size:10px;font-family:var(--fm);color:var(--ac);width:26px;text-align:right;}
.sc-foot{display:flex;align-items:center;gap:5px;padding:0 11px 8px;}
.nested{padding-left:16px;border-left:1px solid var(--bd);margin-left:6px;}
.nested.hidden{display:none;}

/* ══ FORMS ══ */
.add-form{background:var(--sf3);border:1px solid var(--bd2);border-radius:var(--rs);padding:12px;margin:4px 0 6px;}
.fr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
.fi{flex:1;min-width:120px;padding:8px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-family:var(--fj);font-size:16px;outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--ac);}
.fi::placeholder{color:var(--tm);}
.fsel{padding:8px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-family:var(--fj);font-size:16px;outline:none;cursor:pointer;}
.fsel:focus{border-color:var(--ac);}
.flbl{font-size:11px;color:var(--td);white-space:nowrap;}
.fa{display:flex;gap:6px;justify-content:flex-end;margin-top:4px;}
.bok{padding:8px 16px;background:var(--ac);border:none;border-radius:var(--rs);color:white;font-family:var(--fj);font-size:13px;font-weight:500;cursor:pointer;}
.bok:active{opacity:.8;}
.bno{padding:8px 12px;background:transparent;border:1px solid var(--bd);border-radius:var(--rs);color:var(--td);font-family:var(--fj);font-size:13px;cursor:pointer;}
.bno:active{color:var(--tx);}

/* field selector for task range */
.field-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.fp-opt{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--td);font-size:11px;font-family:var(--fj);cursor:pointer;transition:all .15s;user-select:none;}
.fp-opt.sel{border-color:var(--ac);background:rgba(124,133,245,.12);color:var(--ac);}
.fp-check{width:12px;height:12px;border-radius:2px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:8px;}
.fp-opt.sel .fp-check::after{content:'✓';}
.dyn-fields{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}
.dyn-row{display:flex;align-items:center;gap:7px;}
.dyn-lbl{font-size:11px;color:var(--td);width:90px;flex-shrink:0;}
/* relative deadline */
.dl-tabs{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap;}
.dl-tab{padding:5px 10px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--td);font-size:11px;font-family:var(--fj);cursor:pointer;transition:all .15s;}
.dl-tab.active{border-color:var(--ac);background:rgba(124,133,245,.12);color:var(--ac);}
.dl-abs,.dl-rel{display:none;}
.dl-abs.show,.dl-rel.show{display:block;}
.dl-presets{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.dl-pre{padding:5px 11px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--td);font-size:11px;font-family:var(--fm);cursor:pointer;transition:all .15s;}
.dl-pre:hover,.dl-pre:active{border-color:var(--ac2);color:var(--ac2);}
.dl-custom{display:flex;align-items:center;gap:6px;}
.dl-prev-info{font-size:10px;color:var(--td);font-family:var(--fm);padding:4px 8px;background:var(--sf2);border-radius:6px;margin-bottom:6px;}

/* ── CALENDAR ── */
.cf{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.cft{padding:4px 12px;border-radius:20px;font-size:11px;border:1px solid var(--bd);background:transparent;color:var(--td);cursor:pointer;transition:all .15s;font-family:var(--fj);}
.cft.active{background:var(--ac);border-color:var(--ac);color:white;}
.cday{display:flex;border-bottom:1px solid var(--bd);}
.cday:last-child{border-bottom:none;}
.cdl{width:62px;flex-shrink:0;padding:11px 7px;border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;}
.cdn{font-family:var(--fm);font-size:19px;font-weight:300;line-height:1;}
.cds{font-size:9px;color:var(--td);margin-top:2px;}
.cdn.tod{color:var(--ac);}
.cds.tod{color:var(--ac);}
.cdr{flex:1;padding:7px 10px;display:flex;flex-direction:column;gap:4px;}
.cev{padding:7px 9px;border-radius:var(--rs);background:var(--sf2);border-left:3px solid var(--ac);font-size:12px;margin-bottom:5px;}
.cev.xp{border-left-color:var(--exp);}
.cev-top{display:flex;align-items:center;gap:7px;}
.cev-info{flex:1;min-width:0;}
.cev-subject{display:block;font-size:10px;color:var(--td);margin-bottom:1px;}
.cev-main{font-size:13px;font-weight:500;word-break:break-all;}
.cev-main.done{text-decoration:line-through;color:var(--td);}
.cev-field{font-size:11px;color:var(--td);}
.cev-time{font-family:var(--fm);font-size:10px;color:var(--td);white-space:nowrap;flex-shrink:0;}
.cev-prog{display:flex;align-items:center;gap:6px;margin-top:5px;padding-left:23px;}
.cev-pct{font-size:10px;font-family:var(--fm);color:var(--ac);width:26px;text-align:right;flex-shrink:0;}
.cempty{font-size:11px;color:var(--tm);padding:5px 0;}
.cday-summary{display:flex;align-items:center;gap:6px;flex-wrap:wrap;cursor:pointer;padding:8px 0;min-height:36px;user-select:none;}
.cday-summary:active{opacity:.7;}
.cday-count{font-size:11px;font-family:var(--fm);padding:2px 7px;border-radius:10px;}
.cday-empty{font-size:11px;color:var(--tm);}
.cday-detail{display:none;padding-bottom:4px;}
.cday-detail.open{display:block;}
.cday.past .cdn{color:var(--tm);}
.cday.past .cds{color:var(--tm);}
.cday.has-overdue{border-left:2px solid rgba(243,139,168,.5);}

/* ── MODALS ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.ov.hidden{display:none;}
.modal{background:var(--sf);border:1px solid var(--bd2);border-radius:16px 16px 0 0;padding:22px 20px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;}
.modal h3{font-size:15px;margin-bottom:14px;}
.mf{margin-bottom:10px;}
.mf label{display:block;font-size:11px;color:var(--td);margin-bottom:3px;}
.mf input,.mf select{width:100%;padding:9px 10px;background:var(--sf3);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-family:var(--fm);font-size:16px;outline:none;}
.mf input:focus,.mf select:focus{border-color:var(--ac);}
.mf input[type=password]{letter-spacing:2px;}
.mnote{font-size:10px;color:var(--tm);line-height:1.7;margin-top:6px;}
.mnote a{color:var(--ac);text-decoration:none;}
.ma{display:flex;gap:6px;justify-content:flex-end;margin-top:14px;}
.empty{text-align:center;padding:48px 20px;color:var(--tm);}
.empty .ico{font-size:32px;margin-bottom:10px;opacity:.4;}
.empty p{font-size:12px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="hbg" id="hbg" onclick="toggleNav()">
      <span></span><span></span><span></span>
    </button>
    <h1>StudyFlow</h1>
    <span id="clock"></span>
  </header>
  <div class="body">
    <!-- NAV OVERLAY -->
    <div class="nav-overlay" id="nov" onclick="closeNav()"></div>
    <!-- DRAWER NAV -->
    <nav class="nav" id="nav">
      <button class="nt active" data-tab="all" onclick="sw('all')">
        <span class="dot" style="background:var(--ac)"></span>すべて
        <span class="cnt" id="cnt-all">0</span>
      </button>
      <div class="nsep"></div>
      <button class="nt" data-tab="塾" onclick="sw('塾')">
        <span class="dot" style="background:var(--cj)"></span>塾
        <span class="cnt" id="cnt-塾">0</span>
      </button>
      <button class="nt" data-tab="学校" onclick="sw('学校')">
        <span class="dot" style="background:var(--cg)"></span>学校
        <span class="cnt" id="cnt-学校">0</span>
      </button>
      <button class="nt" data-tab="自学" onclick="sw('自学')">
        <span class="dot" style="background:var(--cz)"></span>自学
        <span class="cnt" id="cnt-自学">0</span>
      </button>
      <button class="nt" data-tab="その他" onclick="sw('その他')">
        <span class="dot" style="background:var(--co)"></span>その他
        <span class="cnt" id="cnt-その他">0</span>
      </button>
      <div class="nsep"></div>
      <button class="nt" data-tab="calendar" onclick="sw('calendar')">
        <span class="dot" style="background:var(--td)"></span>📅 カレンダー
      </button>
      <div class="nbot">
        <button class="nt" style="font-size:12px;padding:8px 10px;gap:6px" onclick="openGhModal()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub同期
        </button>
        <div class="syncs" id="syncs">未設定</div>
        <button class="nt" style="font-size:12px;padding:8px 10px;gap:6px" onclick="exportJSON()">
          💾 バックアップ
        </button>
        <label class="nt" style="font-size:12px;padding:8px 10px;gap:6px;cursor:pointer">
          📂 復元
          <input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
        </label>
      </div>
    </nav>
    <!-- MAIN -->
    <div class="right" id="right"></div>
  </div>
</div>

<!-- GitHub modal -->
<div class="ov hidden" id="gh-modal">
  <div class="modal">
    <h3>🔗 GitHub同期設定</h3>
    <div class="mf"><label>GitHubユーザー名</label><input id="gh-user" type="text" placeholder="your-username"></div>
    <div class="mf"><label>リポジトリ名</label><input id="gh-repo" type="text" placeholder="studyflow-data"></div>
    <div class="mf"><label>Personal Access Token</label><input id="gh-tok" type="password" placeholder="ghp_xxxxxxxxxxxx"></div>
    <div class="mf"><label>保存ファイル名</label><input id="gh-file" type="text" value="tasks.json"></div>
    <p class="mnote">
      ① <a href="https://github.com/new" target="_blank">github.com/new</a> でリポジトリを作成（Private推奨）<br>
      ② <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Fine-grained token</a> を作成 → Repository access: このリポジトリのみ → Permissions: Contents = Read and write<br>
      ③ 上の欄に入力して「保存 &amp; テスト」
    </p>
    <div class="ma">
      <button class="bno" onclick="closeGhModal()">キャンセル</button>
      <button class="bok" onclick="saveGhCfg()">保存 &amp; テスト</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="ov hidden" id="em">
  <div class="modal">
    <h3 id="em-h">編集</h3>
    <div id="em-b"></div>
    <div class="ma">
      <button class="bno" onclick="closeEM()">キャンセル</button>
      <button class="bok" onclick="commitEM()">保存</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════
//  FIELD DEFINITIONS
//  タスクの区切り項目
// ════════════════════════════════
const RANGE_FIELDS = [
  { id:'page',  label:'ページ数',     ph:'例: pp.120-135' },
  { id:'sec',   label:'セクション/章', ph:'例: 第3章, Ch.5' },
  { id:'prob',  label:'問題番号/語番号',ph:'例: No.12〜18, #201-250' },
];

// ════════════════════════════════
//  STATE
// ════════════════════════════════
// parents = [{id,tab,type,title,subject,expanded, subtasks:[subtask…]}]
// subtask = {id,title,subject?,fields:{page?,sec?,prob?},
//            deadline,totalItems,progress,done,expanded, subtasks:[…]}
const TABS=['塾','学校','自学','その他'];
const TYPES=['問題集','教科書','単語帳','授業復習','汎用'];
const DAYS=['日','月','火','水','木','金','土'];
const TC={塾:'var(--cj)',学校:'var(--cg)',自学:'var(--cz)','その他':'var(--co)',all:'var(--ac)'};

let P=[], curTab='all', ghCfg=null;
let formTarget=null, emTarget=null;
// selectedFields for current open form
let formFields=new Set(['prob']);

// ════════════════════════════════
//  EXPORT / IMPORT
// ════════════════════════════════
function exportJSON(){
  const blob=new Blob([JSON.stringify(P,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  const pad=n=>n.toString().padStart(2,'0');
  a.download=`studyflow_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.href=url;a.click();URL.revokeObjectURL(url);
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data))throw new Error('invalid');
      if(!confirm(`${data.length}件の教材データを復元します。現在のデータは上書きされます。よろしいですか？`))return;
      P=data;
      await saveL();
      render();
      alert('✅ 復元しました！');
    }catch(err){alert('❌ ファイルが正しくありません');}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ════════════════════════════════
//  INDEXEDDB
// ════════════════════════════════
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('studyflow',1);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');
    };
    req.onsuccess=e=>{res(e.target.result);};
    req.onerror=e=>{rej(e);};
  });
}
function idbGet(key){
  return new Promise((res,rej)=>{
    const tx=db.transaction('kv','readonly');
    const req=tx.objectStore('kv').get(key);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e);
  });
}
function idbSet(key,val){
  return new Promise((res,rej)=>{
    const tx=db.transaction('kv','readwrite');
    const req=tx.objectStore('kv').put(val,key);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e);
  });
}

// ════════════════════════════════
//  INIT
// ════════════════════════════════
async function init(){
  try{
    db=await openDB();
    const saved=await idbGet('tasks');
    if(saved)P=saved;
    else{
      // migrate from localStorage if exists
      const old=localStorage.getItem('sf4');
      if(old){P=JSON.parse(old);await idbSet('tasks',P);}
    }
    const g=await idbGet('ghcfg');
    if(g){ghCfg=g;ust(`@${ghCfg.user}`);}
  }catch(e){
    // fallback to localStorage
    try{const d=localStorage.getItem('sf4');if(d)P=JSON.parse(d);}catch(e2){}
  }
  render();
  setInterval(()=>{updateClock();updateDeadlineBadgesOnly();},30000);
  updateClock();
}
async function saveL(){
  try{await idbSet('tasks',P);}
  catch(e){localStorage.setItem('sf4',JSON.stringify(P));}
  schedGh();
}
function ust(t){document.getElementById('syncs').textContent=t;}
function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});}
function updateDeadlineBadgesOnly(){
  // Update deadline badges in-place without destroying the DOM/forms
  if(formTarget)return; // never touch DOM while a form is open
  updateCounts();
  // re-render badges on parent cards
  P.forEach(p=>{
    const sumEl=document.querySelector(`#pc-${p.id} .pc-summ`);
    if(!sumEl)return;
    const prog=leafProg(p);
    const pb=prog?`<span class="badge prog">📋 ${prog.done}/${prog.tot}</span>`:'';
    sumEl.innerHTML=pb+sumBadges(p);
    const card=document.getElementById(`pc-${p.id}`);
    if(card)card.classList.toggle('xp-border',(dlSum(p)||{}).ex>0);
  });
}

// ════════════════════════════════
//  NAV
// ════════════════════════════════
function toggleNav(){
  const nav=document.getElementById('nav');
  const nov=document.getElementById('nov');
  const hbg=document.getElementById('hbg');
  const open=nav.classList.toggle('open');
  nov.classList.toggle('show',open);
  hbg.classList.toggle('open',open);
}
function closeNav(){
  document.getElementById('nav').classList.remove('open');
  document.getElementById('nov').classList.remove('show');
  document.getElementById('hbg').classList.remove('open');
}
function sw(tab){
  curTab=tab;
  document.querySelectorAll('.nt').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  closeNav();render();
}

// ════════════════════════════════
//  TREE UTILS
// ════════════════════════════════
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
function find(id,arr){for(const n of arr){if(n.id===id)return n;const f=find(id,n.subtasks||[]);if(f)return f;}return null;}
function remove(id,arr){for(let i=0;i<arr.length;i++){if(arr[i].id===id){arr.splice(i,1);return true;}if(remove(id,arr[i].subtasks||[]))return true;}return false;}
function cln(o){return JSON.parse(JSON.stringify(o));}
function reId(n){n.id=gid();(n.subtasks||[]).forEach(reId);return n;}

// ════════════════════════════════
//  DEADLINE
// ════════════════════════════════
function collectDL(n){const r=[];if(n.deadline)r.push(n.deadline);(n.subtasks||[]).forEach(s=>collectDL(s).forEach(d=>r.push(d)));return r;}
function dlSum(node){
  const dls=collectDL(node);if(!dls.length)return null;
  const now=Date.now();let ex=0,near=null;
  dls.forEach(dl=>{const t=new Date(dl).getTime();if(t<now)ex++;else if(!near||t<new Date(near).getTime())near=dl;});
  return{ex,near};
}
function fmtDL(dl){
  const diff=new Date(dl).getTime()-Date.now();
  if(diff<0)return{text:'Expired',cls:'expired'};
  const m=Math.floor(diff/60000);if(m<60)return{text:`${m}分後`,cls:'urgent'};
  const h=Math.floor(diff/3600000);if(h<24)return{text:`${h}時間後`,cls:h<6?'urgent':'warn'};
  const d=Math.floor(diff/86400000);return{text:`${d}日後`,cls:d<=3?'warn':'ok'};
}
function sumBadges(node){
  const s=dlSum(node);if(!s)return'';const p=[];
  if(s.ex)p.push(`<span class="badge expired">✕ Ex×${s.ex}</span>`);
  if(s.near){const f=fmtDL(s.near);p.push(`<span class="badge ${f.cls}">⏱ ${f.text}</span>`);}
  return p.join('');
}
function fmtDate(dl){const d=new Date(dl);return`${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;}

function leafProg(node){
  const subs=node.subtasks||[];if(!subs.length)return null;
  let tot=0,done=0;
  function wk(n){if(!(n.subtasks&&n.subtasks.length)){tot++;if(n.done)done++;}else n.subtasks.forEach(wk);}
  subs.forEach(wk);return{tot,done};
}

// ════════════════════════════════
//  RENDER HELPERS
// ════════════════════════════════
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderFieldTags(sub){
  const f=sub.fields||{};
  const parts=[];
  RANGE_FIELDS.forEach(rf=>{
    if(f[rf.id])parts.push(`<span class="tag">📄 ${esc(f[rf.id])}</span>`);
  });
  return parts.join('');
}

// ════════════════════════════════
//  RENDER
// ════════════════════════════════
function render(){
  updateCounts();
  const el=document.getElementById('right');
  if(curTab==='calendar'){renderCal(el);return;}
  const parents=curTab==='all'?P:P.filter(p=>p.tab===curTab);
  const lbl=curTab==='all'?'すべての教材':curTab;
  const clr=TC[curTab]||'var(--ac)';
  el.innerHTML=`
  <div class="ph">
    <div class="ph-t"><div class="ph-bar" style="background:${clr}"></div>${lbl}</div>
    <button class="add-p-btn" onclick="showPF()">＋ 教材追加</button>
  </div>
  <div id="pf-root"></div>
  <div class="plist">
    ${parents.length?parents.map(p=>renderP(p)).join(''):`<div class="empty"><div class="ico">📚</div><p>教材がありません</p></div>`}
  </div>`;
}

function renderP(p){
  const clr=TC[p.tab]||'var(--ac)';
  const hasEx=(dlSum(p)||{}).ex>0;
  const prog=leafProg(p);
  const pb=prog?`<span class="badge prog">📋 ${prog.done}/${prog.tot}</span>`:'';
  return`
  <div class="pc${hasEx?' xp-border':''}" id="pc-${p.id}">
    <div class="pc-head">
      <div class="pc-bar" style="background:${clr}"></div>
      <div class="pc-info">
        <div class="pc-title">${esc(p.title)}</div>
        <div class="pc-meta">
          <span class="tag t-${p.type}">${p.type}</span>
          <span class="tag" style="background:rgba(255,255,255,.04)">${p.tab}</span>
          ${p.subject?`<span class="tag">📖 ${esc(p.subject)}</span>`:''}
        </div>
      </div>
      <div class="pc-acts">
        <button class="act" onclick="openEM('p','${p.id}')">✏️</button>
        <button class="act" onclick="dupP('${p.id}')">⧉</button>
        <button class="act del" onclick="delP('${p.id}')">🗑</button>
      </div>
    </div>
    ${pb||sumBadges(p)?`<div class="pc-summ">${pb}${sumBadges(p)}</div>`:''}
    <div class="pc-strip">
      <button class="tog${p.expanded?' open':''}" id="tog-${p.id}" onclick="togP('${p.id}')">
        <span class="chev">▶</span> タスク (${(p.subtasks||[]).length})
      </button>
      <button class="add-s-btn" onclick="showSF('${p.id}','${p.id}')">＋ タスク追加</button>
    </div>
    <div class="sub-area${p.expanded?'':' hidden'}" id="sa-${p.id}">
      <div id="sf-${p.id}"></div>
      <div id="sc-${p.id}">
        ${(p.subtasks||[]).map(s=>renderS(s,p.id)).join('')}
      </div>
    </div>
  </div>`;
}

function renderS(s,rootId,indent=0){
  const dlB=s.deadline?(()=>{const f=fmtDL(s.deadline);return`<span class="badge ${f.cls}">⏱ ${f.text}</span>`;})():'';
  const hasNested=s.subtasks&&s.subtasks.length>0;
  const ml=indent>0?`style="margin-left:${indent*14}px"`:'';
  return`
  <div ${ml}>
    <div class="sc${s.done?' done-c':''}${(s.deadline&&new Date(s.deadline)<Date.now())?' xp-c':''}" id="card-${s.id}">
      <div class="sc-head">
        <div class="chk${s.done?' on':''}" onclick="togDone('${s.id}','${rootId}')"></div>
        <div class="sc-body">
          ${s.subject?`<div style="font-size:11px;color:var(--td);margin-bottom:2px">📖 ${esc(s.subject)}</div>`:''}
          ${s.title?`<div class="sc-title${s.done?' done':''}">${esc(s.title)}</div>`:''}
          ${!s.title&&Object.values(s.fields||{}).some(Boolean)?`<div class="sc-field-main${s.done?' done':''}">${Object.entries(s.fields||{}).filter(([k,v])=>v).map(([k,v])=>`<span>${esc(v)}</span>`).join('<span class="sc-field-sep">·</span>')}</div>`:''}
          <div class="sc-tags">
            ${s.title?renderFieldTags(s):''}
            ${s.deadline?`<span class="tag">🗓 ${fmtDate(s.deadline)}</span>`:''}
            ${dlB}
            ${hasNested?sumBadges(s):''}
          </div>
        </div>
        <div class="sc-acts">
          <button class="act" style="font-size:11px" onclick="openEM('s','${s.id}','${rootId}')">✏️</button>
          <button class="act" style="font-size:11px" onclick="dupS('${s.id}','${rootId}')">⧉</button>
          <button class="act del" style="font-size:11px" onclick="delS('${s.id}','${rootId}')">🗑</button>
        </div>
      </div>
      ${s.totalItems>1?`
      <div class="sc-prog">
        <span class="pl">${s.progress||0}/${s.totalItems}</span>
        <input type="range" class="pslider" min="0" max="${s.totalItems}" value="${s.progress||0}"
          oninput="updProg('${s.id}','${rootId}',this.value)">
        <span class="ppct" id="pp-${s.id}">${Math.round((s.progress||0)/s.totalItems*100)}%</span>
      </div>`:''}
      <div class="sc-foot">
        <button class="tog${s.expanded?' open':''}" id="tog-${s.id}" onclick="togS('${s.id}','${rootId}')">
          <span class="chev">▶</span> サブ (${(s.subtasks||[]).length})
        </button>
        <button class="add-s-btn" onclick="showSF('${rootId}','${s.id}')">＋</button>
      </div>
    </div>
    <div id="sf-${s.id}"></div>
    <div class="nested${s.expanded?'':' hidden'}" id="sa-${s.id}">
      ${(s.subtasks||[]).map(c=>renderS(c,rootId,indent+1)).join('')}
    </div>
  </div>`;
}

function updateCounts(){
  document.getElementById('cnt-all').textContent=P.length;
  TABS.forEach(t=>{const e=document.getElementById(`cnt-${t}`);if(e)e.textContent=P.filter(p=>p.tab===t).length;});
}

// ════════════════════════════════
//  TOGGLES
// ════════════════════════════════
function togP(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  p.expanded=!p.expanded;saveL();
  document.getElementById(`sa-${id}`)?.classList.toggle('hidden',!p.expanded);
  document.getElementById(`tog-${id}`)?.classList.toggle('open',p.expanded);
}
function togS(id,rootId){
  const r=P.find(x=>x.id===rootId);if(!r)return;
  const s=find(id,r.subtasks||[]);if(!s)return;
  s.expanded=!s.expanded;saveL();
  document.getElementById(`sa-${id}`)?.classList.toggle('hidden',!s.expanded);
  document.getElementById(`tog-${id}`)?.classList.toggle('open',s.expanded);
}
function togDone(id,rootId){
  const r=P.find(x=>x.id===rootId);if(!r)return;
  const s=find(id,r.subtasks||[]);if(!s)return;
  s.done=!s.done;saveL();
  const chk=document.querySelector(`#card-${id} .chk`);
  const ttl=document.querySelector(`#card-${id} .sc-title`);
  const fld=document.querySelector(`#card-${id} .sc-field-main`);
  const card=document.getElementById(`card-${id}`);
  if(chk)chk.classList.toggle('on',s.done);
  if(ttl)ttl.classList.toggle('done',s.done);
  if(fld)fld.classList.toggle('done',s.done);
  if(card)card.classList.toggle('done-c',s.done);
  if(!formTarget)updateDeadlineBadgesOnly();
}
function updProg(id,rootId,val){
  const r=P.find(x=>x.id===rootId);if(!r)return;
  const s=find(id,r.subtasks||[]);
  if(!s)return;
  s.progress=parseInt(val);
  const e=document.getElementById(`pp-${id}`);
  if(e)e.textContent=Math.round(s.progress/s.totalItems*100)+'%';
  // auto-check when slider reaches 100%
  if(s.progress>=s.totalItems&&!s.done){
    s.done=true;
    const chk=document.querySelector(`#card-${id} .chk`);
    const ttl=document.querySelector(`#card-${id} .sc-title`);
    const card=document.getElementById(`card-${id}`);
    if(chk)chk.classList.add('on');
    if(ttl)ttl.classList.add('done');
    if(card)card.classList.add('done-c');
  } else if(s.progress<s.totalItems&&s.done){
    // uncheck if slider pulled back below 100%
    s.done=false;
    const chk=document.querySelector(`#card-${id} .chk`);
    const ttl=document.querySelector(`#card-${id} .sc-title`);
    const card=document.getElementById(`card-${id}`);
    if(chk)chk.classList.remove('on');
    if(ttl)ttl.classList.remove('done');
    if(card)card.classList.remove('done-c');
  }
  saveL();
}

// ════════════════════════════════
//  PARENT FORM
// ════════════════════════════════
function showPF(){
  closeForm();formTarget={type:'parent',cid:'pf-root'};
  const defTab=curTab==='all'||curTab==='calendar'?'塾':curTab;
  document.getElementById('pf-root').innerHTML=`
  <div class="add-form" style="margin-bottom:12px">
    <div class="fr">
      <input class="fi" id="pf-ti" placeholder="教材名（例: チャート式数学II）" style="flex:2">
    </div>
    <div class="fr">
      <select class="fsel" id="pf-tab">${TABS.map(t=>`<option value="${t}"${t===defTab?' selected':''}>${t}</option>`).join('')}</select>
      <select class="fsel" id="pf-type">${TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
    </div>
    <div class="fr">
      <span class="flbl">教材詳細（省略可）</span>
      <input class="fi" id="pf-sub" placeholder="例: 数学II・B、システム英単語など">
    </div>
    <div class="fa">
      <button class="bno" onclick="closeForm()">キャンセル</button>
      <button class="bok" onclick="addP()">追加</button>
    </div>
  </div>`;
  document.getElementById('pf-ti').focus();
}
function addP(){
  const t=document.getElementById('pf-ti')?.value.trim();if(!t)return;
  P.push({id:gid(),tab:document.getElementById('pf-tab').value,type:document.getElementById('pf-type').value,
    title:t,subject:document.getElementById('pf-sub')?.value.trim()||'',subtasks:[],expanded:true});
  saveL();closeForm();render();
}

// ════════════════════════════════
//  SUBTASK FORM  (with field picker)
// ════════════════════════════════
function showSF(rootId,parentId){
  closeForm();
  // find prevDL = deadline of last sibling that has one (walk backwards)
  let prevDL=null;
  const rr=P.find(x=>x.id===rootId);
  if(rr){
    const sibs=parentId===rootId ? (rr.subtasks||[]) : ((find(parentId,rr.subtasks||[])||{}).subtasks||[]);
    for(let i=sibs.length-1;i>=0;i--){
      if(sibs[i].deadline){prevDL=sibs[i].deadline;break;}
    }
  }
  formTarget={type:'sub',cid:`sf-${parentId}`,rootId,parentId,prevDL};
  formFields=new Set(['prob']);
  const container=document.getElementById(`sf-${parentId}`);if(!container)return;
  expandForForm(rootId,parentId);
  container.innerHTML=buildSubForm(rootId,parentId,prevDL);
  // don't auto-focus to avoid iOS keyboard pop
}

function buildSubForm(rootId,parentId,prevDL){
  const hasPrev=!!prevDL;
  const prevFmt=hasPrev?fmtDate(prevDL):'';
  return`
  <div class="add-form">
    <div class="fr">
      <input class="fi" id="sf-ti" placeholder="タスク名・範囲の説明">
    </div>
    <div class="fr">
      <span class="flbl" style="width:100%">教材名（省略可・サブ教材の場合に入力）</span>
      <input class="fi" id="sf-sub" placeholder="例: 英語長文問題精講">
    </div>
    <div style="margin-bottom:6px">
      <div class="flbl" style="margin-bottom:6px">区切り項目を選択（複数可）</div>
      <div class="field-picker">
        ${RANGE_FIELDS.map(f=>`
          <button class="fp-opt${formFields.has(f.id)?' sel':''}" data-fid="${f.id}" data-rid="${rootId}" data-pid="${parentId}" onclick="toggleField(this.dataset.fid,this.dataset.rid,this.dataset.pid)" type="button">
            <span class="fp-check"></span>${f.label}
          </button>`).join('')}
      </div>
    </div>
    <div class="dyn-fields" id="dyn-fields">
      ${buildDynFields()}
    </div>
    <div style="margin-bottom:8px">
      <div class="flbl" style="margin-bottom:6px">締め切り</div>
      <div class="dl-tabs">
        <button class="dl-tab active" onclick="dlMode('abs',this)">日時指定</button>
        ${hasPrev?`<button class="dl-tab" onclick="dlMode('rel',this)">前のタスクから</button>`:''}
      </div>
      <div class="dl-abs show" id="dl-abs">
        <input class="fi" type="datetime-local" id="sf-dl" style="width:100%">
      </div>
      ${hasPrev?`
      <div class="dl-rel" id="dl-rel">
        <div class="dl-prev-info">前のタスクの締め切り: ${prevFmt}</div>
        <div class="dl-presets">
          <button class="dl-pre" data-days="1" onclick="applyPreset(parseInt(this.dataset.days))">+1日</button>
          <button class="dl-pre" data-days="3" onclick="applyPreset(parseInt(this.dataset.days))">+3日</button>
          <button class="dl-pre" data-days="7" onclick="applyPreset(parseInt(this.dataset.days))">+1週間</button>
          <button class="dl-pre" data-days="14" onclick="applyPreset(parseInt(this.dataset.days))">+2週間</button>
        </div>
        <div class="dl-custom">
          <span class="flbl" style="width:auto">+</span>
          <input type="number" id="rel-n" min="1" value="1" style="width:70px;padding:8px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:16px;outline:none;">
          <select id="rel-unit" style="padding:8px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:16px;outline:none;">
            <option value="day">日後</option>
            <option value="week">週間後</option>
          </select>
          <button class="dl-pre" onclick="applyCustomRel()">適用</button>
        </div>
        <input type="hidden" id="sf-dl-rel" value="">
      </div>`:''}
    </div>
    <div class="fr">
      <span class="flbl">タスク数</span>
      <input class="fi" type="number" id="sf-tot" min="1" max="9999" value="1" style="flex:1;max-width:100px">
      <span class="flbl">（進捗スライダー用）</span>
    </div>
    <div class="fa">
      <button class="bno" onclick="closeForm()">キャンセル</button>
      <button class="bok" onclick="addS()">追加</button>
    </div>
  </div>`;
}

function buildDynFields(){
  return [...formFields].map(fid=>{
    const def=RANGE_FIELDS.find(x=>x.id===fid);
    if(!def)return'';
    return`<div class="dyn-row"><span class="dyn-lbl">${def.label}</span><input class="fi" id="ff-${fid}" placeholder="${def.ph}" style="flex:1"></div>`;
  }).join('');
}

function toggleField(fid,rootId,parentId){
  if(formFields.has(fid))formFields.delete(fid);else formFields.add(fid);
  // update picker UI
  document.querySelectorAll('.fp-opt').forEach(btn=>{
    const bid=btn.getAttribute('onclick').match(/toggleField\('(\w+)'/)?.[1];
    if(bid)btn.classList.toggle('sel',formFields.has(bid));
  });
  // rebuild dynamic fields (preserve values)
  const saved={};
  RANGE_FIELDS.forEach(rf=>{const el=document.getElementById(`ff-${rf.id}`);if(el)saved[rf.id]=el.value;});
  document.getElementById('dyn-fields').innerHTML=buildDynFields();
  // restore
  Object.entries(saved).forEach(([k,v])=>{const el=document.getElementById(`ff-${k}`);if(el)el.value=v;});
}

function expandForForm(rootId,parentId){
  if(parentId===rootId){
    const r=P.find(x=>x.id===rootId);
    if(r&&!r.expanded){r.expanded=true;document.getElementById(`sa-${rootId}`)?.classList.remove('hidden');document.getElementById(`tog-${rootId}`)?.classList.add('open');}
  } else {
    const r=P.find(x=>x.id===rootId);
    if(r){const pn=find(parentId,r.subtasks||[]);if(pn&&!pn.expanded){pn.expanded=true;document.getElementById(`sa-${parentId}`)?.classList.remove('hidden');document.getElementById(`tog-${parentId}`)?.classList.add('open');}}
  }
}

function addS(){
  if(!formTarget)return;
  const{rootId,parentId}=formTarget;
  const title=document.getElementById('sf-ti')?.value.trim()||'';
  // get deadline: formTarget.computedDL is set by applyRelDays (most reliable)
  let dl='';
  const relVisible=document.getElementById('dl-rel')?.classList.contains('show');
  if(relVisible){
    // prefer value stored in formTarget over DOM (DOM can be stale on iOS)
    dl=formTarget.computedDL||document.getElementById('sf-dl-rel')?.value||'';
  } else {
    dl=document.getElementById('sf-dl')?.value||'';
  }
  const tot=Math.max(1,parseInt(document.getElementById('sf-tot')?.value)||1);
  const subject=document.getElementById('sf-sub')?.value.trim()||'';
  const fields={};
  formFields.forEach(fid=>{const el=document.getElementById(`ff-${fid}`);if(el&&el.value.trim())fields[fid]=el.value.trim();});
  const sub={id:gid(),title,subject,fields,deadline:dl||null,totalItems:tot,progress:0,done:false,subtasks:[],expanded:false};
  const r=P.find(x=>x.id===rootId);if(!r)return;
  if(parentId===rootId){r.subtasks.push(sub);r.expanded=true;}
  else{const pn=find(parentId,r.subtasks||[]);if(pn){pn.subtasks=pn.subtasks||[];pn.subtasks.push(sub);pn.expanded=true;}}
  saveL();closeForm();render();
}

function dlMode(mode,btn){
  document.querySelectorAll('.dl-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const abs=document.getElementById('dl-abs');
  const rel=document.getElementById('dl-rel');
  if(abs)abs.classList.toggle('show',mode==='abs');
  if(rel)rel.classList.toggle('show',mode==='rel');
  if(mode==='abs'&&formTarget)formTarget.computedDL=null;
}
function applyPreset(days){applyRelDays(days);}
function applyCustomRel(){
  const n=parseInt(document.getElementById('rel-n')?.value||'1');
  const unit=document.getElementById('rel-unit')?.value;
  applyRelDays(unit==='week'?n*7:n);
}
function applyRelDays(days){
  if(!formTarget||!formTarget.prevDL)return;
  const base=new Date(formTarget.prevDL);
  base.setDate(base.getDate()+days);
  const pad=n=>n.toString().padStart(2,'0');
  const val=`${base.getFullYear()}-${pad(base.getMonth()+1)}-${pad(base.getDate())}T${pad(base.getHours())}:${pad(base.getMinutes())}`;
  // save directly to formTarget so addS() can reliably read it
  formTarget.computedDL=val;
  // also write to hidden input as backup
  const hid=document.getElementById('sf-dl-rel');
  if(hid)hid.value=val;
  // show result prominently
  const info=document.querySelector('.dl-prev-info');
  const d=base;
  const dispDate=`${d.getMonth()+1}月${d.getDate()}日（${['日','月','火','水','木','金','土'][d.getDay()]}）`;
  const dispTime=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if(info)info.innerHTML=
    `<span style="font-size:10px;color:var(--td)">基準: ${fmtDate(formTarget.prevDL)} + ${days}日</span><br>`+
    `<span style="font-size:16px;font-weight:600;color:var(--ac3)">${dispDate} ${dispTime}</span>`;
}
function closeForm(){
  if(formTarget){const e=document.getElementById(formTarget.cid);if(e)e.innerHTML='';formTarget=null;}
  formFields=new Set(['prob']);
}

function delP(id){

  P.splice(P.findIndex(x=>x.id===id),1);saveL();render();
}
function dupP(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  const c=reId(cln(p));c.title+='（コピー）';
  P.splice(P.findIndex(x=>x.id===id)+1,0,c);saveL();render();
}
function delS(id,rootId){
  if(!confirm('このタスクを削除しますか？'))return;
  const r=P.find(x=>x.id===rootId);if(r){remove(id,r.subtasks||[]);saveL();render();}
}
function dupS(id,rootId){
  const r=P.find(x=>x.id===rootId);if(!r)return;
  const node=find(id,r.subtasks||[]);if(!node)return;
  const c=reId(cln(node));c.title+='（コピー）';
  function ins(arr){for(let i=0;i<arr.length;i++){if(arr[i].id===id){arr.splice(i+1,0,c);return true;}if(ins(arr[i].subtasks||[]))return true;}return false;}
  ins(r.subtasks||[]);saveL();render();
}

//  CALENDAR
// ════════════════════════════════
let calFilterTab='all';

function collectCalEvents(){
  // returns flat list of {dl, title, fields, subject, tab, parentTitle, parentSubject, id, rootId, done, totalItems, progress}
  const evs=[];
  P.forEach(p=>{
    function col(node, parentNode){
      if(node.deadline){
        const xp=new Date(node.deadline).getTime()<Date.now();
        if(!xp||!node.done){
          // resolve display name: prefer node's own subject, fallback to parent's
          const displaySubject=node.subject||(parentNode?parentNode.subject:'')||(parentNode?parentNode.title:p.title)||'';
          evs.push({
            dl:new Date(node.deadline),
            title:node.title||'',
            fields:node.fields||{},
            subject:displaySubject,
            tab:p.tab,
            parentTitle:p.title,
            id:node.id,
            rootId:p.id,
            done:node.done,
            totalItems:node.totalItems||1,
            progress:node.progress||0,
          });
        }
      }
      (node.subtasks||[]).forEach(s=>col(s,node));
    }
    // start from direct subtasks, passing parent=null (so parentTitle = p.title)
    (p.subtasks||[]).forEach(s=>col(s,null));
  });
  return evs;
}

function renderCal(el){
  const evs=collectCalEvents();
  evs.sort((a,b)=>a.dl-b.dl);

  const byD={};
  evs.forEach(e=>{
    const k=e.dl.toDateString();
    if(!byD[k])byD[k]=[];
    byD[k].push(e);
  });

  const today=new Date();today.setHours(0,0,0,0);

  // start: earliest past undone task, or today
  let startDay=new Date(today);
  const pastKeys=Object.keys(byD).filter(k=>new Date(k)<today);
  if(pastKeys.length){
    const earliest=pastKeys.reduce((a,b)=>new Date(a)<new Date(b)?a:b);
    startDay=new Date(earliest);startDay.setHours(0,0,0,0);
  }

  // end: today + 90 days
  const endDay=new Date(today);endDay.setDate(endDay.getDate()+90);

  const days=[];
  for(let d=new Date(startDay);d<=endDay;d.setDate(d.getDate()+1)) days.push(new Date(d));

  let rows='';
  days.forEach(d=>{
    const k=d.toDateString();
    const allEvs=byD[k]||[];
    const iT=d.getTime()===today.getTime();
    const isPast=d<today;
    const filtered=allEvs.filter(e=>calFilterTab==='all'||e.tab===calFilterTab);
    const hasOverdue=filtered.some(e=>e.dl<Date.now()&&!e.done);

    // summary badges: tab counts
    const tabCounts={};
    filtered.forEach(e=>{ tabCounts[e.tab]=(tabCounts[e.tab]||0)+1; });
    const summaryHTML=Object.entries(tabCounts).map(([tab,cnt])=>{
      const clr=TC[tab]||'var(--ac)';
      return`<span class="cday-count" style="background:${clr}1a;color:${clr}">${tab} ${cnt}</span>`;
    }).join('');

    // detail: sorted by time, with slider+check
    const detailHTML=filtered.slice().sort((a,b)=>a.dl-b.dl).map(ev=>{
      const xp=ev.dl.getTime()<Date.now()&&!ev.done;
      const clr=TC[ev.tab]||'var(--ac)';
      const hm=ev.dl.getHours().toString().padStart(2,'0')+':'+ev.dl.getMinutes().toString().padStart(2,'0');
      const fieldStr=Object.values(ev.fields||{}).filter(Boolean).join(' · ');
      // main label: fields if no title, else title
      const mainLabel=ev.title?esc(ev.title):esc(fieldStr)||'(無題)';
      const subLabel=ev.title&&fieldStr?`<span class="cev-field"> ${esc(fieldStr)}</span>`:'';
      const subjLabel=ev.subject?`<span class="cev-subject">📖 ${esc(ev.subject)}</span>`:'';
      // progress bar if totalItems>1
      const progHTML=ev.totalItems>1?`
        <div class="cev-prog">
          <input type="range" class="pslider" min="0" max="${ev.totalItems}" value="${ev.progress}"
            oninput="calUpdProg('${ev.id}','${ev.rootId}',this.value,this)"
            style="flex:1">
          <span class="cev-pct" id="calpct-${ev.id}">${Math.round(ev.progress/ev.totalItems*100)}%</span>
        </div>`:'';
      return`<div class="cev${xp?' xp':''}" data-tab="${ev.tab}" style="border-left-color:${clr}">
        <div class="cev-top">
          <div class="chk${ev.done?' on':''}" id="calchk-${ev.id}" onclick="calTogDone('${ev.id}','${ev.rootId}',this)" style="flex-shrink:0"></div>
          <div class="cev-info">
            ${subjLabel}
            <span class="cev-main${ev.done?' done':''}" id="caltitle-${ev.id}">${mainLabel}${subLabel}</span>
          </div>
          <span class="cev-time">${hm}</span>
        </div>
        ${progHTML}
      </div>`;
    }).join('');

    const safeK=k.replace(/ /g,'_');
    rows+=`
    <div class="cday${isPast?' past':''}${hasOverdue?' has-overdue':''}" data-date="${k}">
      <div class="cdl" onclick="togCalDay('${safeK}')">
        <div class="cdn${iT?' tod':''}">${d.getDate()}</div>
        <div class="cds${iT?' tod':''}">${d.getMonth()+1}月${DAYS[d.getDay()]}</div>
      </div>
      <div class="cdr">
        <div class="cday-summary" onclick="togCalDay('${safeK}')">
          ${filtered.length?summaryHTML:`<span class="cday-empty">−</span>`}
        </div>
        <div class="cday-detail${iT?' open':''}" id="cd-${safeK}">
          ${filtered.length?detailHTML:`<div class="cempty">タスクなし</div>`}
        </div>
      </div>
    </div>`;
  });

  el.innerHTML=`
  <div>
    <div style="font-size:16px;font-weight:700;margin-bottom:12px">📅 締め切りカレンダー</div>
    <div class="cf">
      ${['all','塾','学校','自学','その他'].map(t=>`<button class="cft${t==='all'||t===calFilterTab?' active':''}" data-tab="${t}" onclick="calF('${t}',this)">${t==='all'?'すべて':t}</button>`).join('')}
    </div>
    <div id="cal-rows">${rows}</div>
  </div>`;

  // scroll to today
  const todayEl=document.querySelector('.cdn.tod');
  if(todayEl)setTimeout(()=>todayEl.closest('.cday')?.scrollIntoView({behavior:'smooth',block:'center'}),100);
}

function togCalDay(safeK){
  const el=document.getElementById(`cd-${safeK}`);
  if(el)el.classList.toggle('open');
}

function calF(tab,btn){
  calFilterTab=tab;
  document.querySelectorAll('.cft').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCal(document.getElementById('right'));
}

function calTogDone(id,rootId,el){
  const r=P.find(x=>x.id===rootId);if(!r)return;
  const s=find(id,r.subtasks||[]);if(!s)return;
  s.done=!s.done;saveL();
  el.classList.toggle('on',s.done);
  const title=document.getElementById(`caltitle-${id}`);
  if(title)title.classList.toggle('done',s.done);
  const card=el.closest('.cev');
  if(card)card.classList.toggle('xp',new Date(s.deadline)<Date.now()&&!s.done);
}

function calUpdProg(id,rootId,val,sliderEl){
  const r=P.find(x=>x.id===rootId);if(!r)return;
  const s=find(id,r.subtasks||[]);if(!s)return;
  s.progress=parseInt(val);
  const pct=document.getElementById(`calpct-${id}`);
  if(pct)pct.textContent=Math.round(s.progress/s.totalItems*100)+'%';
  if(s.progress>=s.totalItems&&!s.done){
    s.done=true;
    const chk=document.getElementById(`calchk-${id}`);
    const title=document.getElementById(`caltitle-${id}`);
    if(chk)chk.classList.add('on');
    if(title)title.classList.add('done');
  } else if(s.progress<s.totalItems&&s.done){
    s.done=false;
    const chk=document.getElementById(`calchk-${id}`);
    const title=document.getElementById(`caltitle-${id}`);
    if(chk)chk.classList.remove('on');
    if(title)title.classList.remove('done');
  }
  saveL();
}

function openGhModal(){
  if(ghCfg){
    document.getElementById('gh-user').value=ghCfg.user||'';
    document.getElementById('gh-repo').value=ghCfg.repo||'';
    document.getElementById('gh-tok').value=ghCfg.token||'';
    document.getElementById('gh-file').value=ghCfg.file||'tasks.json';
  }
  document.getElementById('gh-modal').classList.remove('hidden');
}
function closeGhModal(){document.getElementById('gh-modal').classList.add('hidden');}
async function saveGhCfg(){
  const cfg={user:document.getElementById('gh-user').value.trim(),repo:document.getElementById('gh-repo').value.trim(),
    token:document.getElementById('gh-tok').value.trim(),file:document.getElementById('gh-file').value.trim()||'tasks.json'};
  if(!cfg.user||!cfg.repo||!cfg.token){alert('すべて入力してください');return;}
  ghCfg=cfg;
  try{await idbSet('ghcfg',cfg);}catch(e){localStorage.setItem('sf4-gh',JSON.stringify(cfg));}
  try{await ghSave(cfg,P);ust(`✓ @${cfg.user}`);alert('✅ GitHub同期の設定が完了しました！');closeGhModal();}
  catch(e){alert('❌ 接続失敗: '+e.message);}
}
async function ghSave(cfg,data){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  let sha=null;
  try{const r=await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${cfg.file}`,
    {headers:{Authorization:`token ${cfg.token}`,Accept:'application/vnd.github.v3+json'}});
    if(r.ok)sha=(await r.json()).sha;}catch(e){}
  const body={message:`SF sync ${new Date().toISOString()}`,content};if(sha)body.sha=sha;
  const res=await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${cfg.file}`,
    {method:'PUT',headers:{Authorization:`token ${cfg.token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json();throw new Error(e.message);}
  ust(`✓ ${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}`);
}
async function autoLoad(){
  if(!ghCfg)return;const c=ghCfg;
  try{const r=await fetch(`https://api.github.com/repos/${c.user}/${c.repo}/contents/${c.file}`,
    {headers:{Authorization:`token ${c.token}`,Accept:'application/vnd.github.v3+json'}});
    if(!r.ok)return;const d=await r.json();
    P=JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))));
    localStorage.setItem('sf4',JSON.stringify(P));ust('↓ ロード完了');render();}
  catch(e){ust('⚠ ロード失敗');}
}
let ghT=null;
function schedGh(){
  if(!ghCfg)return;clearTimeout(ghT);
  ghT=setTimeout(()=>ghSave(ghCfg,P).catch(()=>ust('⚠ 保存失敗')),2500);
}
